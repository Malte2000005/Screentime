<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ScreenTime Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Bildschirmzeit Dashboard</h1>

        <div class="card">
            <h2>Filter</h2>
            <form method="get" action="/">
                <label>Person:</label>
                <select name="person" onchange="this.form.submit()">
                    {% for key, val in people.items() %}
                    <option value="{{ key }}" {% if key == selected_person %}selected{% endif %}>{{ val.label }}</option>
                    {% endfor %}
                </select>

                <label>Datei:</label>
                <select name="file" onchange="this.form.submit()">
                    <option value="">Gesamtes Semester</option>
                    {% for f in available_files %}
                    <option value="{{ f }}" {% if f == selected_file %}selected{% endif %}>{{ f }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Gesamtzeit</h3>
                <p class="big-number">{{ total_minutes }} Min</p>
            </div>
            <div class="card">
                <h3>Apps gesamt</h3>
                <p class="big-number">{{ app_count }}</p>
            </div>
        </div>

        <div class="card">
            <h2>Zeitliche Entwicklung</h2>
            <div style="height: 300px;">
                <canvas id="timeChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Top 5 Apps</h2>
            <table>
                <thead>
                    <tr><th>App</th><th>Minuten</th></tr>
                </thead>
                <tbody>
                    {% for app in top5 %}
                    <tr><td>{{ app.App }}</td><td>{{ app.Minuten|round(2) }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const timeData = {{ time_series | tojson }};
        const ctx = document.getElementById('timeChart').getContext('2d');

        if (timeData.length > 0) {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeData.map(d => d.Datum),
                    datasets: [{
                        label: 'Minuten pro Tag',
                        data: timeData.map(d => d.Minuten),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
